<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>編集</title>
</head>
<body>

<h1>編集画面</h1>

<form action="/update" method="post">
    <input type="hidden" name="id" th:value="${item.id}">

    <input type="text" name="newItem" th:value="${item.item}">

    <button type="submit">更新</button>
</form>

</body>
</html>
