<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ユーザー一覧</title>
</head>
<body style="margin: 40px; font-family: Arial;">

<h1>ユーザー一覧</h1>

<ul>
    <li th:each="user : ${users}">
        <span th:text="${user.username}"></span>
    </li>
</ul>

</body>
</html>
